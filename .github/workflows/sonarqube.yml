name: SonarQube Analysis

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  quality:
    name: Test, scan, and check Quality Gate
    # Local SonarQube at localhost:9000 is not reachable from GitHub-hosted runners.
    # Use a self-hosted runner on the same machine/network as your SonarQube server.
    # If you expose SonarQube publicly or use SonarCloud, you may change this to ubuntu-latest.
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run formatting and lint checks
        run: |
          black --check src tests
          ruff check src tests

      - name: Run tests with coverage
        run: |
          pytest --cov=src --cov-report=xml --cov-report=term-missing --junitxml=test-results.xml

      - name: Upload test and coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sonarqube-test-and-coverage-reports
          path: |
            coverage.xml
            test-results.xml

      - name: SonarQube scan and Quality Gate
        shell: powershell
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        run: |
          $hostUrl = $env:SONAR_HOST_URL.Trim()
          $scannerToken = $env:SONAR_TOKEN.Trim()

          if ([string]::IsNullOrWhiteSpace($scannerToken)) {
            throw "SONAR_TOKEN is empty. Please set repository secret SONAR_TOKEN."
          }

          $basicAuth = [Convert]::ToBase64String([Text.Encoding]::ASCII.GetBytes("${scannerToken}:"))
          $authHeaders = @{ Authorization = "Basic $basicAuth" }
          $authResult = Invoke-RestMethod `
            -Uri "$hostUrl/api/authentication/validate" `
            -Headers $authHeaders `
            -Method GET

          if (-not $authResult.valid) {
            throw "SONAR_TOKEN is invalid for $hostUrl. Regenerate token and update GitHub secret SONAR_TOKEN."
          }

          $scannerHostUrl = $hostUrl `
            -replace "://localhost", "://host.docker.internal" `
            -replace "://127.0.0.1", "://host.docker.internal"

          Write-Host "Using SonarQube URL for scanner container: $scannerHostUrl"

          docker run --rm `
            -e SONAR_HOST_URL="$scannerHostUrl" `
            -e SONAR_TOKEN="$scannerToken" `
            -v "${PWD}:/usr/src" `
            -w /usr/src `
            sonarsource/sonar-scanner-cli `
            --define "sonar.projectBaseDir=/usr/src" `
            --define "sonar.qualitygate.wait=true"
