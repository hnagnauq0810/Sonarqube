name: SonarQube Analysis

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  quality:
    name: Test, scan, and check Quality Gate
    # Local SonarQube at localhost:9000 is not reachable from GitHub-hosted runners.
    # Use a self-hosted runner on the same machine/network as your SonarQube server.
    # If you expose SonarQube publicly or use SonarCloud, you may change this to ubuntu-latest.
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run formatting and lint checks
        run: |
          black --check src tests
          ruff check src tests

      - name: Run tests with coverage
        run: |
          pytest --cov=src --cov-report=xml --cov-report=term-missing --junitxml=test-results.xml

      - name: Upload test and coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sonarqube-test-and-coverage-reports
          path: |
            coverage.xml
            test-results.xml

      - name: SonarQube scan and Quality Gate
        shell: pwsh
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        run: |
          docker run --rm `
            -e SONAR_HOST_URL="${env:SONAR_HOST_URL}" `
            -e SONAR_TOKEN="${env:SONAR_TOKEN}" `
            -v "${PWD}:/usr/src" `
            -w /usr/src `
            sonarsource/sonar-scanner-cli `
            -Dsonar.projectBaseDir=/usr/src `
            -Dsonar.qualitygate.wait=true
